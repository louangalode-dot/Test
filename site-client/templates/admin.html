<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commit & Go — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F7F7F5; }
        .topbar { background: #111; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
        .topbar .logo { font-size: 16px; font-weight: 900; letter-spacing: 3px; color: white; }
        .topbar .logo span { color: #0066FF; }
        .topbar a { color: #666; text-decoration: none; font-size: 13px; }
        .topbar a:hover { color: white; }
        .container { max-width: 800px; margin: 48px auto; padding: 0 24px; }
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
        p { color: #888; margin-bottom: 40px; }
        .section { background: white; border: 1px solid #E8E8E4; border-radius: 20px; padding: 32px; margin-bottom: 24px; }
        .section h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #0066FF; text-transform: uppercase; letter-spacing: 2px; }
        .field { margin-bottom: 16px; }
        label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 12px 16px; border: 1px solid #E8E8E4; border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s; }
        input:focus, textarea:focus { border-color: #0066FF; box-shadow: 0 0 0 3px rgba(0,102,255,0.1); }
        textarea { height: 100px; resize: vertical; }
        .save-btn { background: #0066FF; color: white; border: none; padding: 14px 32px; border-radius: 100px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; }
        .save-btn:hover { background: #0052cc; }
        .success { background: #dcfce7; color: #166534; padding: 12px 20px; border-radius: 10px; font-size: 14px; margin-bottom: 24px; display: none; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="logo">COMMIT<span> & GO</span></div>
        <a href="/logout">Se déconnecter</a>
    </div>
    <div class="container">
        <h1>Panneau Admin</h1>
        <p>Modifiez le contenu de votre site ici.</p>
        <div class="success" id="success">✅ Modifications sauvegardées !</div>
        <div class="section">
            <h2>Hero</h2>
            <div class="field"><label>Titre principal</label><textarea id="hero_title"></textarea></div>
            <div class="field"><label>Description</label><textarea id="hero_desc"></textarea></div>
            <div class="field"><label>Localisation</label><input type="text" id="hero_location"></div>
        </div>
        <div class="section">
            <h2>À propos</h2>
            <div class="field"><label>Paragraphe 1</label><textarea id="about_p1"></textarea></div>
            <div class="field"><label>Paragraphe 2</label><textarea id="about_p2"></textarea></div>
            <div class="field"><label>Paragraphe 3</label><textarea id="about_p3"></textarea></div>
        </div>
        <div class="section">
            <h2>Contact</h2>
            <div class="field"><label>Description contact</label><textarea id="contact_desc"></textarea></div>
        </div>
        <button class="save-btn" onclick="save()">Sauvegarder les modifications</button>
    </div>
    <script>
        async function load() {
            const res = await fetch('/api/content');
            const data = await res.json();
            for (const key in data) {
                const el = document.getElementById(key);
                if (el) el.value = data[key];
            }
        }
        async function save() {
            const fields = ['hero_title','hero_desc','hero_location','about_p1','about_p2','about_p3','contact_desc'];
            const data = {};
            fields.forEach(f => { data[f] = document.getElementById(f).value; });
            await fetch('/api/content', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            document.getElementById('success').style.display = 'block';
            setTimeout(() => document.getElementById('success').style.display = 'none', 3000);
        }
        load();
    </script>
</body>
</html>
